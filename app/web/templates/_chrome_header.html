<header class="site-header site-header--cartwise">
    <div class="site-header-brand">
        <a href="{{ lang_prefix }}/" class="cw-brand">
            <img src="/static/brand/cartpulse-icon.svg" width="28" height="28" alt="">
            {{ t("site.name") }}
        </a>
    </div>
    {% include "_site_nav.html" %}
    <div class="site-header-right">
        {% include "_lang_switch.html" %}
        <button type="button" class="basket-trigger" id="basket-trigger" aria-label="{{ t('basket.sidebar_label') }}">
            <svg width="20" height="20" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2" stroke-linecap="round" stroke-linejoin="round" aria-hidden="true"><path d="M6 2L3 6v14a2 2 0 0 0 2 2h14a2 2 0 0 0 2-2V6l-3-4z"></path><line x1="3" y1="6" x2="21" y2="6"></line><path d="M16 10a4 4 0 0 1-8 0"></path></svg>
            <span class="basket-count" id="basket-trigger-count" aria-hidden="true">0</span>
        </button>
        <nav class="site-nav site-nav--secondary" aria-label="{{ t('nav.aria') }}">
            <a href="{{ lang_prefix }}/search">{{ t("nav.search") }}</a>
            <a href="{{ lang_prefix }}/admin">{{ t("nav.admin") }}</a>
        </nav>
    </div>
</header>
