<!DOCTYPE html>
<html lang="{{ lang }}">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, viewport-fit=cover">
    <meta name="theme-color" content="#F7F8F7">
    <title>{{ t("history.title") }}</title>
    <link rel="stylesheet" href="/static/ui.css">
    <link rel="stylesheet" href="/static/style.css">
</head>
<body class="cw-app page-static">
    <div class="app-wrap">
        {% include "_chrome_header.html" %}
        <main class="page-static-main">
            <h1 class="cw-h2 page-static-title">{{ t("history.heading") }}</h1>
            <p class="page-static-lead">{{ t("history.lead") }}</p>
            <div class="cw-card page-static-card">
                <div class="cw-skeleton cw-skeleton--block" aria-hidden="true"></div>
                <p class="cw-small page-static-hint">{{ t("history.skeleton_hint") }}</p>
            </div>
            {% if latest_pricing_update %}
            <p class="data-freshness-line" role="status">{{ latest_pricing_update }}</p>
            {% endif %}
        </main>
    </div>
    {% include "_basket_sidebar.html" %}
    <script src="/static/lang.js"></script>
    <script src="/static/search-basket.js"></script>
</body>
</html>
